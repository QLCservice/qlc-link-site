<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>夜間の救急・医療相談｜QLC Link</title>
</head>
<body>

<style>
  :root{
    --navy:#1C2B40; --navy-light:#2C405C; --brass:#B79358; --brass-light:#D8BD8A;
    --cream:#F6F2EA; --cream-card:#FFFFFF; --charcoal:#33312C; --charcoal-soft:#6B6760; --clay:#C97B5B;
  }
  .qlcwrap{max-width:700px;margin:0 auto;font-family:"Noto Sans JP","Hiragino Kaku Gothic ProN",sans-serif;color:var(--charcoal);background:var(--cream);}
  .qlcwrap *{box-sizing:border-box;}
  .qtop{display:flex;align-items:center;justify-content:space-between;background:var(--navy);color:#F3EFE6;padding:12px 18px;font-size:13px;border-radius:8px 8px 0 0;}
  .qtop a{color:var(--brass-light);text-decoration:none;font-weight:500;}
  .qtop .brand{font-weight:600;letter-spacing:.04em;}
  .qbody{padding:22px 20px 30px;}
  .qplaque{display:flex;align-items:center;gap:12px;margin-bottom:6px;}
  .qplaque::before,.qplaque::after{content:"";flex:1;height:1px;background:var(--brass);opacity:.55;}
  .qplaque span{font-weight:600;font-size:18px;letter-spacing:.08em;color:var(--brass);white-space:nowrap;}
  .qlisted{text-align:center;font-size:12.5px;color:var(--charcoal-soft);margin-bottom:22px;}
  .qprovider{background:var(--cream-card);border-radius:12px;padding:18px;margin-bottom:18px;border:1px solid #E8E0CE;}
  .qpname{font-weight:600;font-size:16px;color:var(--navy);margin-bottom:4px;}
  .qarea{font-size:12px;color:var(--charcoal-soft);line-height:1.7;margin-bottom:14px;}
  .qphoto{width:100%;border-radius:8px;margin-bottom:14px;display:block;}
  .qdesc{font-size:13px;line-height:1.85;color:var(--charcoal);margin-bottom:14px;}
  .qpriceblock{margin-bottom:14px;}
  .qpricehead{font-size:12.5px;font-weight:500;color:var(--navy);border-bottom:1px solid var(--brass-light);padding-bottom:5px;margin-bottom:6px;}
  .qprow{display:flex;justify-content:space-between;font-size:12.5px;padding:4px 0;gap:12px;}
  .qprow span:last-child{color:var(--navy);font-weight:500;white-space:nowrap;}
  .qnote{background:#FBF6EC;border:1px solid var(--brass-light);border-radius:8px;padding:10px 12px;font-size:11.5px;line-height:1.8;color:var(--charcoal-soft);margin-bottom:14px;}
  .qcoupon{background:var(--navy);color:#F3EFE6;border-radius:8px;padding:14px 16px;margin-bottom:16px;}
  .qcoupon .qclabel{font-size:11px;letter-spacing:.06em;color:var(--brass-light);margin-bottom:4px;}
  .qcoupon .qcval{font-size:18px;font-weight:600;color:#FFFFFF;font-family:"Noto Serif JP",serif;}
  .qcoupon .qcsub{font-size:11.5px;color:#CFC8B8;margin-top:6px;line-height:1.7;}
  .qctarow{display:flex;gap:8px;flex-wrap:wrap;}
  .qbtn{flex:1;min-width:120px;text-align:center;padding:10px 12px;border-radius:18px;font-size:12.5px;font-weight:500;text-decoration:none;white-space:nowrap;}
  .qbtn-outline{border:1.5px solid var(--brass);color:var(--navy);background:transparent;}
  .qbtn-filled{background:var(--brass);color:var(--navy);}
  .qhr{height:1px;background:#E8E0CE;margin:20px 0;}
  .qback{display:block;width:fit-content;margin:22px auto 0;border:1.5px solid var(--brass);color:var(--navy);background:transparent;border-radius:18px;padding:9px 22px;font-size:12.5px;font-weight:500;text-decoration:none;text-align:center;}
  a{cursor:pointer;}
</style>
<div class="qlcwrap">
<div class="qtop"><a href="https://www.qlc-service.com/" target="_blank">&#8592; 戻る</a><span class="brand">QLC Link</span></div>
<div class="qbody">
<div class="qplaque"><span>夜間の救急・医療相談</span></div>
<div class="qlisted">掲載サービス：ファストドクター</div>

<div class="qprovider">
  <div class="qpname">ファストドクター</div>
  <div class="qdesc">急な体調不良の際、医師による往診やオンライン診察を依頼できるアプリです。「救急往診」「オンライン診察」に対応。まずはアプリをダウンロードしてご準備ください（無料）。</div>
  <div class="qpriceblock">
    <div class="qpricehead">会員番号</div>
    <div class="qprow"><span>QLC Link居住者様専用</span><span>593582</span></div>
  </div>
  <div class="qnote">対応エリアはアプリ内でご確認いただけます。往診は受付状況により待ち時間が発生する場合があります（目安はアプリ内に表示）。</div>
  <div class="qcoupon">
    <div class="qclabel">居住者様限定特典</div>
    <div class="qcval">医師の往診費（交通費）が無料</div>
    <div class="qcsub">下記の会員番号をアプリ内でご入力ください。</div>
  </div>
  <div class="qctarow">
    <a class="qbtn qbtn-filled" target="_blank" href="https://fastdoctor.jp/">アプリをインストール</a>
  </div>
</div>

</div>
<a class="qback" href="https://www.qlc-service.com/" target="_blank">&#8592; サービス一覧に戻る</a>
</div>
</body>
</html>
