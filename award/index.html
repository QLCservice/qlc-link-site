<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>サービス促進賞 申請フォーム</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen py-10 px-4 sm:px-6 lg:px-8">

  <div class="max-w-3xl mx-auto bg-white p-8 rounded-xl shadow-md">
    <h2 class="text-2xl font-bold text-gray-800 border-b pb-4 mb-6 text-center">
      🏆 サービス促進賞 WEB申請システム
    </h2>

    <form id="awardForm" onsubmit="handleSubmit(event)" class="space-y-6">
      
      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-2">推薦者の種別 <span class="text-red-500">*</span></label>
        <div class="grid grid-cols-2 gap-2 sm:grid-cols-4">
          <label class="flex items-center p-3 border rounded-lg cursor-pointer hover:bg-gray-50">
            <input type="radio" name="recommendType" value="自薦" required class="h-4 w-4 text-indigo-600">
            <span class="ml-2 text-sm text-gray-700">自薦</span>
          </label>
          <label class="flex items-center p-3 border rounded-lg cursor-pointer hover:bg-gray-50">
            <input type="radio" name="recommendType" value="物件担当者" class="h-4 w-4 text-indigo-600">
            <span class="ml-2 text-sm text-gray-700">物件担当者</span>
          </label>
          <label class="flex items-center p-3 border rounded-lg cursor-pointer hover:bg-gray-50">
            <input type="radio" name="recommendType" value="スタッフ担当者" class="h-4 w-4 text-indigo-600">
            <span class="ml-2 text-sm text-gray-700">スタッフ担当者</span>
          </label>
          <label class="flex items-center p-3 border rounded-lg cursor-pointer hover:bg-gray-50">
            <input type="radio" name="recommendType" value="サービス開発室からの推薦" class="h-4 w-4 text-indigo-600">
            <span class="ml-2 text-sm text-gray-700">サービス開発室</span>
          </label>
        </div>
      </div>

      <div class="grid grid-cols-1 gap-4 sm:grid-cols-2">
        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-1">対象物件名 <span class="text-red-500">*</span></label>
          <input type="text" name="propertyName" required class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-500 focus:outline-none">
        </div>
        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-1">対象スタッフ名 <span class="text-red-500">*</span></label>
          <input type="text" name="staffName" required class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-500 focus:outline-none">
        </div>
      </div>

      <hr class="border-gray-200 my-6">

      <div class="space-y-4">
        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-1">① 課題・背景 <span class="text-red-500">*</span></label>
          <textarea name="q1" rows="3" required class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-500 focus:outline-none" placeholder="どのような課題があり、なぜこれを行ったのか"></textarea>
        </div>

        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-1">② 実施内容 <span class="text-red-500">*</span></label>
          <textarea name="q2" rows="3" required class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-500 focus:outline-none" placeholder="具体的に何を行ったのか"></textarea>
        </div>

        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-1">③ 工夫したポイント <span class="text-red-500">*</span></label>
          <textarea name="q3" rows="3" required class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-500 focus:outline-none" placeholder="独自の工夫やこだわり"></textarea>
        </div>

        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-1">④ 実施結果 <span class="text-red-500">*</span></label>
          <textarea name="q4" rows="3" required class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-500 focus:outline-none" placeholder="売上データや掲示物の効果、周囲の反応など"></textarea>
        </div>

        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-1">⑤ 今後の展望</label>
          <textarea name="q5" rows="3" class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-500 focus:outline-none" placeholder="今後どのように展開していくか（任意）"></textarea>
        </div>
      </div>

      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-1">
          添付ファイル（実施前後の写真、掲示物、売上データ等 / 最大4枚）
        </label>
        <input type="file" id="fileInput" accept="image/*" multiple class="w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-indigo-50 file:text-indigo-700 hover:file:bg-indigo-100">
        <p id="fileError" class="text-red-500 text-xs mt-1 hidden">※ファイルは最大4枚までしか添付できません。</p>
      </div>

      <div class="pt-4">
        <button type="submit" id="submitBtn" class="w-full bg-indigo-600 text-white font-bold py-3 px-4 rounded-lg hover:bg-indigo-700 transition duration-200 flex justify-center items-center">
          <span>申請を送信する</span>
        </button>
      </div>

    </form>
  </div>

  <script>
    const fileInput = document.getElementById('fileInput');
    const fileError = document.getElementById('fileError');
    
    fileInput.addEventListener('change', () => {
      if (fileInput.files.length > 4) {
        fileError.classList.remove('hidden');
        fileInput.value = '';
      } else {
        fileError.classList.add('hidden');
      }
    });

    const toBase64 = file => new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.readAsDataURL(file);
      reader.onload = () => resolve({ base64: reader.result, name: file.name });
      reader.onerror = error => reject(error);
    });

    async function handleSubmit(event) {
      event.preventDefault();
      
      const form = event.target;
      const submitBtn = document.getElementById('submitBtn');
      
      submitBtn.disabled = true;
      submitBtn.classList.add('opacity-50', 'cursor-not-allowed');
      submitBtn.innerHTML = '送信中... データを処理しています';

      try {
        const formData = {
          recommendType: form.recommendType.value,
          propertyName: form.propertyName.value,
          staffName: form.staffName.value,
          q1: form.q1.value,
          q2: form.q2.value,
          q3: form.q3.value,
          q4: form.q4.value,
          q5: form.q5.value,
          files: []
        };

        const files = fileInput.files;
        if (files.length > 0) {
          const filePromises = Array.from(files).map(file => toBase64(file));
          formData.files = await Promise.all(filePromises);
        }

        // 🔥【超重要】競合バグを完全に回避する安全な送信処理（ここにsplitはありません）
        await fetch('https://script.google.com/macros/s/AKfycbxc7EX7NGlNvfqfV1YvwdIYP-LWuzm83cweNCMql6LKr1VKGo__xsB3TqC2SaT5ssYu/exec', {
          method: 'POST',
          mode: 'no-cors', // GoogleのCORSブロックを完全に無効化する魔法のモード
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify(formData)
        });

        // 通信ブロックを回避するno-corsモードの特性に合わせ、送信完了アラートを即時実行
        alert('【申請完了】エントリーの送信処理を受け付けました！\nスプレッドシートへの記録、PDFの自動生成、および指定アドレスへの通知メールが連動します。');
        form.reset();
        resetButton(submitBtn);

      } catch (error) {
        alert('通信エラーが発生しました: ' + error.message);
        resetButton(submitBtn);
      }
    }

    function resetButton(btn) {
      btn.disabled = false;
      btn.classList.remove('opacity-50', 'cursor-not-allowed');
      btn.innerHTML = '<span>申請を送信する</span>';
    }
  </script>
</body>
</html>
